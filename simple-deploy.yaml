# Simple deployment configuration for debugging
steps:
  # Step 1: Build backend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building backend..."
        cd backend
        npm ci
        npm run build
        echo "Backend build completed"
    id: 'build-backend'

  # Step 2: Build frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building frontend..."
        cd frontend
        npm ci
        npm run build
        echo "Frontend build completed"
    id: 'build-frontend'

  # Step 3: Deploy backend (immediate promotion)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'deploy-backend'

  # Step 4: Deploy frontend (immediate promotion)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'frontend-app.yaml'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'deploy-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
