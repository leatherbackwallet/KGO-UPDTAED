<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fef3c7"/>
  <g transform="translate(100, 120)">
    <!-- Cake base (largest) -->
    <rect x="0" y="120" width="200" height="50" fill="#f3f4f6" rx="5"/>
    <!-- Cake middle -->
    <rect x="20" y="90" width="160" height="40" fill="#e5e7eb" rx="5"/>
    <!-- Cake top -->
    <rect x="40" y="60" width="120" height="35" fill="#d1d5db" rx="5"/>
    <!-- Cake top tier -->
    <rect x="60" y="30" width="80" height="35" fill="#9ca3af" rx="5"/>
    <!-- Wedding topper -->
    <circle cx="100" cy="15" r="8" fill="#fbbf24"/>
    <rect x="98" y="23" width="4" height="15" fill="#fbbf24"/>
    <!-- Decorative elements -->
    <circle cx="30" cy="140" r="3" fill="#fbbf24"/>
    <circle cx="170" cy="135" r="3" fill="#fbbf24"/>
    <circle cx="50" cy="145" r="3" fill="#fbbf24"/>
    <circle cx="150" cy="140" r="3" fill="#fbbf24"/>
    <circle cx="70" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="130" cy="145" r="3" fill="#fbbf24"/>
    <!-- Middle tier decorations -->
    <circle cx="40" cy="105" r="2" fill="#fbbf24"/>
    <circle cx="160" cy="100" r="2" fill="#fbbf24"/>
    <circle cx="60" cy="110" r="2" fill="#fbbf24"/>
    <circle cx="140" cy="105" r="2" fill="#fbbf24"/>
    <!-- Top tier decorations -->
    <circle cx="70" cy="75" r="2" fill="#fbbf24"/>
    <circle cx="130" cy="70" r="2" fill="#fbbf24"/>
    <circle cx="90" cy="80" r="2" fill="#fbbf24"/>
    <circle cx="110" cy="75" r="2" fill="#fbbf24"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Wedding Cake</text>
</svg>
