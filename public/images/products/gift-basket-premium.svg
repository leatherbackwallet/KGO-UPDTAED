<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fef3c7"/>
  <g transform="translate(100, 200)">
    <!-- Basket -->
    <ellipse cx="100" cy="80" rx="80" ry="20" fill="#92400e"/>
    <ellipse cx="100" cy="60" rx="70" ry="15" fill="#a16207"/>
    <ellipse cx="100" cy="40" rx="60" ry="10" fill="#92400e"/>
    
    <!-- Basket weave pattern -->
    <line x1="20" y1="80" x2="180" y2="80" stroke="#78350f" stroke-width="2"/>
    <line x1="30" y1="60" x2="170" y2="60" stroke="#78350f" stroke-width="2"/>
    <line x1="40" y1="40" x2="160" y2="40" stroke="#78350f" stroke-width="2"/>
    
    <!-- Basket handle -->
    <path d="M 40 40 Q 100 20 160 40" stroke="#78350f" stroke-width="4" fill="none"/>
    
    <!-- Wine bottle -->
    <rect x="60" y="30" width="20" height="40" fill="#dc2626" rx="2"/>
    <rect x="62" y="28" width="16" height="4" fill="#991b1b"/>
    <rect x="64" y="26" width="12" height="2" fill="#dc2626"/>
    
    <!-- Chocolate box -->
    <rect x="90" y="35" width="25" height="15" fill="#92400e" rx="2"/>
    <rect x="92" y="37" width="21" height="11" fill="#a16207" rx="1"/>
    <circle cx="102" cy="42" r="2" fill="#fbbf24"/>
    <circle cx="108" cy="45" r="1.5" fill="#fbbf24"/>
    
    <!-- Flowers -->
    <g transform="translate(130, 40)">
      <circle cx="0" cy="0" r="8" fill="#ef4444"/>
      <circle cx="0" cy="0" r="5" fill="#dc2626"/>
      <circle cx="0" cy="0" r="2" fill="#991b1b"/>
    </g>
    <g transform="translate(140, 35)">
      <circle cx="0" cy="0" r="6" fill="#10b981"/>
      <circle cx="0" cy="0" r="4" fill="#059669"/>
      <circle cx="0" cy="0" r="1.5" fill="#047857"/>
    </g>
    
    <!-- Gift wrap -->
    <rect x="70" y="50" width="30" height="20" fill="#3b82f6" rx="2"/>
    <rect x="75" y="55" width="20" height="10" fill="#1d4ed8" rx="1"/>
    <line x1="85" y1="50" x2="85" y2="70" stroke="#fbbf24" stroke-width="2"/>
    <line x1="70" y1="60" x2="100" y2="60" stroke="#fbbf24" stroke-width="2"/>
    
    <!-- Ribbon -->
    <rect x="95" y="30" width="4" height="40" fill="#dc2626"/>
    <rect x="70" y="48" width="30" height="4" fill="#dc2626"/>
    
    <!-- Bow -->
    <circle cx="97" cy="35" r="6" fill="#dc2626"/>
    <circle cx="97" cy="35" r="3" fill="#991b1b"/>
    
    <!-- Tissue paper -->
    <ellipse cx="100" cy="25" rx="50" ry="8" fill="#f3f4f6" opacity="0.8"/>
    <ellipse cx="100" cy="20" rx="40" ry="6" fill="#e5e7eb" opacity="0.6"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Premium Gift Basket</text>
</svg>
