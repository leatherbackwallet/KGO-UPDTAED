<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fef3c7"/>
  <g transform="translate(100, 150)">
    <!-- Chocolate box -->
    <rect x="0" y="0" width="200" height="120" fill="#92400e" rx="10"/>
    <rect x="10" y="10" width="180" height="100" fill="#a16207" rx="5"/>
    
    <!-- Chocolates -->
    <circle cx="40" cy="40" r="12" fill="#7c2d12"/>
    <circle cx="80" cy="35" r="10" fill="#7c2d12"/>
    <circle cx="120" cy="45" r="11" fill="#7c2d12"/>
    <circle cx="160" cy="38" r="9" fill="#7c2d12"/>
    
    <circle cx="35" cy="70" r="8" fill="#7c2d12"/>
    <circle cx="70" cy="75" r="9" fill="#7c2d12"/>
    <circle cx="105" cy="68" r="7" fill="#7c2d12"/>
    <circle cx="140" cy="72" r="8" fill="#7c2d12"/>
    <circle cx="175" cy="70" r="6" fill="#7c2d12"/>
    
    <circle cx="50" cy="95" r="7" fill="#7c2d12"/>
    <circle cx="85" cy="90" r="8" fill="#7c2d12"/>
    <circle cx="120" cy="95" r="6" fill="#7c2d12"/>
    <circle cx="155" cy="92" r="7" fill="#7c2d12"/>
    
    <!-- Chocolate decorations -->
    <circle cx="40" cy="40" r="4" fill="#fbbf24"/>
    <circle cx="80" cy="35" r="3" fill="#fbbf24"/>
    <circle cx="120" cy="45" r="3.5" fill="#fbbf24"/>
    <circle cx="160" cy="38" r="2.5" fill="#fbbf24"/>
    
    <circle cx="35" cy="70" r="2.5" fill="#fbbf24"/>
    <circle cx="70" cy="75" r="3" fill="#fbbf24"/>
    <circle cx="105" cy="68" r="2" fill="#fbbf24"/>
    <circle cx="140" cy="72" r="2.5" fill="#fbbf24"/>
    <circle cx="175" cy="70" r="2" fill="#fbbf24"/>
    
    <circle cx="50" cy="95" r="2" fill="#fbbf24"/>
    <circle cx="85" cy="90" r="2.5" fill="#fbbf24"/>
    <circle cx="120" cy="95" r="2" fill="#fbbf24"/>
    <circle cx="155" cy="92" r="2" fill="#fbbf24"/>
    
    <!-- Box lid -->
    <rect x="0" y="0" width="200" height="20" fill="#78350f" rx="10"/>
    <rect x="10" y="5" width="180" height="10" fill="#92400e" rx="5"/>
    
    <!-- Ribbon -->
    <rect x="90" y="0" width="20" height="120" fill="#dc2626"/>
    <rect x="0" y="55" width="200" height="10" fill="#dc2626"/>
    
    <!-- Bow -->
    <circle cx="100" cy="15" r="8" fill="#dc2626"/>
    <circle cx="100" cy="15" r="4" fill="#991b1b"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Premium Chocolates</text>
</svg>
