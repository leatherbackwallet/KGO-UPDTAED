# Comprehensive Cloud Build Configuration for OnYourBehlf
# Handles workspace dependencies, PDF generation, and zero-downtime deployment

steps:
  # Step 1: Install root dependencies and build backend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔧 Installing root workspace dependencies..."
        npm ci
        
        echo "🏗️ Building backend..."
        cd backend
        npm ci
        npm run build
        echo "✅ Backend build completed"
    id: 'build-backend'

  # Step 2: Install dependencies and build frontend  
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🏗️ Building frontend..."
        cd frontend
        npm ci
        npm run build
        echo "✅ Frontend build completed"
    id: 'build-frontend'
    waitFor: ['-']  # Run in parallel with backend

  # Step 3: Deploy backend service (api) - App Engine Flex
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--version=v$BUILD_ID'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote immediately
    id: 'deploy-backend'
    waitFor: ['build-backend']

  # Step 4: Deploy frontend service (default) - App Engine Standard
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'frontend-app.yaml'
      - '--version=v$BUILD_ID'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote immediately
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

  # Step 5: Health check backend before promoting
  - name: 'gcr.io/cloud-builders/curl'
    args:
      - '--fail'
      - '--retry'
      - '10'
      - '--retry-delay'
      - '15'
      - '--max-time'
      - '30'
      - 'https://v$BUILD_ID-dot-api-dot-$PROJECT_ID.uc.r.appspot.com/api/health'
    id: 'health-check-backend'
    waitFor: ['deploy-backend']

  # Step 6: Health check frontend before promoting
  - name: 'gcr.io/cloud-builders/curl'
    args:
      - '--fail'
      - '--retry'
      - '10'
      - '--retry-delay'
      - '15'
      - '--max-time'
      - '30'
      - 'https://v$BUILD_ID-dot-$PROJECT_ID.uc.r.appspot.com/api/health'
    id: 'health-check-frontend'
    waitFor: ['deploy-frontend']

  # Step 7: Promote backend to 100% traffic after health check passes
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'api'
      - '--splits=v$BUILD_ID=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'promote-backend'
    waitFor: ['health-check-backend']

  # Step 8: Promote frontend to 100% traffic after health check passes
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'default'
      - '--splits=v$BUILD_ID=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'promote-frontend'
    waitFor: ['health-check-frontend']

  # Step 9: Clean up old versions (stop 0% traffic versions, keep only current + 1 backup)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🧹 Cleaning up old versions..."
        
        # Stop ALL versions with 0% traffic (these cause database conflicts)
        echo "Stopping versions with 0% traffic..."
        
        # Backend cleanup
        echo "Cleaning backend versions..."
        backend_zero_traffic=$(gcloud app versions list --service=api --format="table(version.id,traffic_split,serving_status)" | grep "0.00.*SERVING" | awk '{print $1}' || true)
        if [ -n "$backend_zero_traffic" ]; then
          echo "$backend_zero_traffic" | xargs -r gcloud app versions stop --service=api --quiet 2>/dev/null || true
          echo "Stopped backend versions with 0% traffic: $backend_zero_traffic"
        fi
        
        # Frontend cleanup
        echo "Cleaning frontend versions..."
        frontend_zero_traffic=$(gcloud app versions list --service=default --format="table(version.id,traffic_split,serving_status)" | grep "0.00.*SERVING" | awk '{print $1}' || true)
        if [ -n "$frontend_zero_traffic" ]; then
          echo "$frontend_zero_traffic" | xargs -r gcloud app versions stop --service=default --quiet 2>/dev/null || true
          echo "Stopped frontend versions with 0% traffic: $frontend_zero_traffic"
        fi
        
        # Delete old versions (keep only current + 1 backup)
        echo "Deleting old versions (keeping only current + 1 backup)..."
        gcloud app versions list --service=api --sort-by=~version.createTime --format="value(version.id)" | tail -n +3 | xargs -r gcloud app versions delete --service=api --quiet 2>/dev/null || true
        gcloud app versions list --service=default --sort-by=~version.createTime --format="value(version.id)" | tail -n +3 | xargs -r gcloud app versions delete --service=default --quiet 2>/dev/null || true
        
        echo "✅ Old versions cleaned up (stopped 0% traffic versions, deleted old versions)"
    id: 'cleanup-versions'
    waitFor: ['promote-backend', 'promote-frontend']

# Build options for optimization
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  substitution_option: 'ALLOW_LOOSE'

# Timeout for the entire build process (45 minutes)
timeout: '2700s'

# Substitution variables
substitutions:
  _DEPLOY_ENV: 'production'