steps:
  # Build both images in parallel for efficiency
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA', '-f', 'backend/Dockerfile', '.']
    id: 'build-backend'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA', '-f', 'frontend/Dockerfile', '.']
    id: 'build-frontend'
    dir: '.'
    waitFor: ['-']  # Run in parallel with backend build

  # Push both images in parallel after builds complete
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy both services in parallel after images are pushed
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - app
      - deploy
      - app.yaml
      - --version=$COMMIT_SHA
      - --project=$PROJECT_ID
      - --quiet
    id: 'deploy-backend'
    waitFor: ['push-backend']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - app
      - deploy
      - frontend-app.yaml
      - --version=$COMMIT_SHA
      - --project=$PROJECT_ID
      - --quiet
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  # Enable build caching for faster subsequent builds
  substitution_option: 'ALLOW_LOOSE'
  # Use faster disk for better I/O performance
  diskSizeGb: 100

# Reduce timeout since we're optimizing for speed
timeout: '900s'

# Add substitution variables for better tracking
substitutions:
  _BUILD_TIMESTAMP: '${BUILD_TIMESTAMP}'
  _COMMIT_SHA: '${COMMIT_SHA}'
  _BRANCH_NAME: '${BRANCH_NAME}'
