<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#dc2626"/>
  
  <!-- KGO text -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">KGO</text>
  
  <!-- Small gift box icon -->
  <g transform="translate(20, 8)">
    <!-- Gift box base -->
    <rect x="0" y="3" width="8" height="6" fill="#059669" stroke="#047857" stroke-width="0.3"/>
    
    <!-- Gift box lid -->
    <rect x="1" y="1" width="6" height="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.3"/>
    
    <!-- Ribbon vertical -->
    <rect x="3.5" y="0" width="1" height="9" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.3"/>
    
    <!-- Ribbon horizontal -->
    <rect x="0" y="4" width="8" height="1" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.3"/>
  </g>
</svg> 