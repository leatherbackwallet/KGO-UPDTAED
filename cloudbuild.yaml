# Single Consolidated Cloud Build Configuration for OnYourBehlf
# This deploys both frontend and backend in a single, coordinated build

steps:
  # Step 1: Install dependencies and build backend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building backend..."
        cd backend
        npm ci --only=production
        npm run build
        echo "Backend build completed"
    id: 'build-backend'

  # Step 2: Install dependencies and build frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building frontend..."
        cd frontend
        npm ci --only=production
        npm run build
        echo "Frontend build completed"
    id: 'build-frontend'
    waitFor: ['-']  # Run in parallel with backend

  # Step 3: Deploy backend service (api)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--version=$SHORT_SHA'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote immediately
    id: 'deploy-backend'
    waitFor: ['build-backend']

  # Step 4: Deploy frontend service (default) 
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'frontend-app.yaml'
      - '--version=$SHORT_SHA'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote immediately
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

  # Step 5: Health check backend before promoting
  - name: 'gcr.io/cloud-builders/curl'
    args:
      - '--fail'
      - '--retry'
      - '5'
      - '--retry-delay'
      - '10'
      - 'https://$SHORT_SHA-dot-api-dot-$PROJECT_ID.uc.r.appspot.com/api/health'
    id: 'health-check-backend'
    waitFor: ['deploy-backend']

  # Step 6: Health check frontend before promoting
  - name: 'gcr.io/cloud-builders/curl'
    args:
      - '--fail'
      - '--retry'
      - '5'
      - '--retry-delay'
      - '10'
      - 'https://$SHORT_SHA-dot-$PROJECT_ID.uc.r.appspot.com/health'
    id: 'health-check-frontend'
    waitFor: ['deploy-frontend']

  # Step 7: Promote backend to 100% traffic after health check passes
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'api'
      - '--splits=$SHORT_SHA=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'promote-backend'
    waitFor: ['health-check-backend']

  # Step 8: Promote frontend to 100% traffic after health check passes
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'default'
      - '--splits=$SHORT_SHA=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'promote-frontend'
    waitFor: ['health-check-frontend']

  # Step 9: Clean up old versions (keep last 3)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Clean up old backend versions
        gcloud app versions list --service=api --sort-by=~version.createTime --format="value(version.id)" | tail -n +4 | xargs -r gcloud app versions delete --service=api --quiet || true
        
        # Clean up old frontend versions  
        gcloud app versions list --service=default --sort-by=~version.createTime --format="value(version.id)" | tail -n +4 | xargs -r gcloud app versions delete --service=default --quiet || true
        
        echo "Cleanup completed"
    id: 'cleanup-versions'
    waitFor: ['promote-backend', 'promote-frontend']

# Build options for optimization
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  substitution_option: 'ALLOW_LOOSE'

# Timeout for the entire build process
timeout: '1800s'  # 30 minutes

# Substitution variables
substitutions:
  _DEPLOY_ENV: 'production'
