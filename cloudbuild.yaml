steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA', '-f', 'backend/Dockerfile', '.']
    dir: '.'

  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA', '-f', 'frontend/Dockerfile', '.']
    dir: '.'

  # Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA']

  # Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA']

  # Deploy Backend to App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - app
      - deploy
      - app.yaml
      - --version=$COMMIT_SHA
      - --project=$PROJECT_ID
      - --quiet

  # Deploy Frontend to App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - app
      - deploy
      - frontend-app.yaml
      - --version=$COMMIT_SHA
      - --project=$PROJECT_ID
      - --quiet

images:
  - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
