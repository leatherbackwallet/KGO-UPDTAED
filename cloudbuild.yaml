# Simple Working Cloud Build Configuration for OnYourBehlf
# This gets the website back online with basic deployment

steps:
  # Step 1: Build and deploy backend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building backend..."
        cd backend
        npm ci
        npm run build
        echo "Backend build completed"
    id: 'build-backend'

  # Step 2: Deploy backend service using root app.yaml (entrypoint cd's into backend)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'deploy-backend'
    waitFor: ['build-backend']

  # Step 3: Build frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Building frontend..."
        cd frontend
        npm ci
        npm run build
        echo "Frontend build completed"
    id: 'build-frontend'
    waitFor: ['-']  # Run in parallel

  # Step 4: Deploy frontend service using root frontend-app.yaml (entrypoint cd's into frontend)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'frontend-app.yaml'
      - '--project=$PROJECT_ID'
      - '--quiet'
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100

# Timeout
timeout: '1200s'  # 20 minutes
