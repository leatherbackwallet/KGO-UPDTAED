# Optimized Cloud Build Configuration for OnYourBehlf
# This configuration consolidates the build process to reduce additional builds
# and improve deployment efficiency

steps:
  # Step 1: Build both Docker images in parallel
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:latest'
      - '.'
    id: 'build-backend'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA'
      - '-f'
      - 'frontend/Dockerfile'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:latest'
      - '.'
    id: 'build-frontend'
    dir: '.'
    waitFor: ['-']  # Run in parallel with backend

  # Step 2: Tag images as latest for caching
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:latest']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:latest']
    waitFor: ['build-frontend']

  # Step 3: Push both images in parallel
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Step 4: Push latest tags for caching
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-backend:latest']
    waitFor: ['push-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:latest']
    waitFor: ['push-frontend']

  # Step 5: Deploy both services in parallel after all images are pushed
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--version=$COMMIT_SHA'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote to 100% traffic immediately
    id: 'deploy-backend'
    waitFor: ['push-backend']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'frontend-app.yaml'
      - '--version=$COMMIT_SHA'
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--no-promote'  # Don't promote to 100% traffic immediately
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

  # Step 6: Promote both services to 100% traffic after successful deployment
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'api'
      - '--splits=$COMMIT_SHA=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['deploy-backend']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'services'
      - 'set-traffic'
      - 'default'
      - '--splits=$COMMIT_SHA=1'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['deploy-frontend']

# Define the images that will be built
images:
  - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/onyourbehlf-backend:latest'
  - 'gcr.io/$PROJECT_ID/onyourbehlf-frontend:latest'

# Build options for optimization
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  substitution_option: 'ALLOW_LOOSE'
  # Enable build caching
  env:
    - 'DOCKER_BUILDKIT=1'

# Reduced timeout for faster feedback
timeout: '1200s'

# Substitution variables for better tracking
substitutions:
  _BUILD_TIMESTAMP: '${BUILD_TIMESTAMP}'
  _COMMIT_SHA: '${COMMIT_SHA}'
  _BRANCH_NAME: '${BRANCH_NAME}'
  _REPO_NAME: '${REPO_NAME}'
