runtime: nodejs20
service: default

env_variables:
  NODE_ENV: production
  PORT: 8080
  
  # Frontend Environment Variables
  NEXT_PUBLIC_API_URL: "https://api-dot-onyourbehlf.uc.r.appspot.com/api"
  NEXT_PUBLIC_APP_NAME: "OnYourBehlf"
  NEXT_PUBLIC_APP_VERSION: "3.0.0"
  NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
  NEXT_PUBLIC_ENABLE_DEBUG_MODE: "false"
  NEXT_PUBLIC_WHATSAPP_NUMBER: "+918075030919"
  FAST_REFRESH: "false"
  
  # API Configuration for frontend server
  API_URL: "https://api-dot-onyourbehlf.uc.r.appspot.com"
  FRONTEND_URL: "https://www.keralagiftsonline.in"

automatic_scaling:
  target_cpu_utilization: 0.8  # Increased for cost optimization
  min_instances: 0  # Allow scaling to zero to save costs
  max_instances: 3  # Reduced for expected traffic
  target_throughput_utilization: 0.6

resources:
  cpu: 1  # Minimum for App Engine Standard
  memory_gb: 1  # Reduced from 2GB for cost optimization
  disk_size_gb: 10

entrypoint: bash -lc 'cd frontend && node server.js'

handlers:
  # Health check endpoint
  - url: /health
    script: auto
    secure: always

  # All other requests go to the Next.js app
  - url: /.*
    script: auto
    secure: always