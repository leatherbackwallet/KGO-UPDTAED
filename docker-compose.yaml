version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - onyourbehlf-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - onyourbehlf-network

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=onyourbehlf
    volumes:
      - mongodb_data:/data/db
    networks:
      - onyourbehlf-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onyourbehlf-network

volumes:
  mongodb_data:
  redis_data:

networks:
  onyourbehlf-network:
    driver: bridge
