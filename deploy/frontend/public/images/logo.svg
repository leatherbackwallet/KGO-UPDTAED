<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for KGO -->
  <circle cx="25" cy="30" r="20" fill="#dc2626"/>
  
  <!-- KGO text -->
  <text x="25" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">KGO</text>
  
  <!-- Gift box icon -->
  <g transform="translate(55, 15)">
    <!-- Gift box base -->
    <rect x="0" y="8" width="16" height="12" fill="#059669" stroke="#047857" stroke-width="0.5"/>
    
    <!-- Gift box lid -->
    <rect x="2" y="4" width="12" height="6" fill="#dc2626" stroke="#b91c1c" stroke-width="0.5"/>
    
    <!-- Ribbon vertical -->
    <rect x="7" y="2" width="2" height="18" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Ribbon horizontal -->
    <rect x="0" y="10" width="16" height="2" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow left -->
    <path d="M 7 2 Q 5 0 3 2 Q 5 4 7 2" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow right -->
    <path d="M 9 2 Q 11 0 13 2 Q 11 4 9 2" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow center -->
    <circle cx="8" cy="2" r="1" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
  </g>
  
  <!-- Brand text -->
  <text x="85" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#059669">Kerala</text>
  <text x="85" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">GiftsOnline</text>
  
  <!-- Decorative elements -->
  <circle cx="180" cy="15" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="185" cy="25" r="1.5" fill="#dc2626" opacity="0.6"/>
  <circle cx="175" cy="35" r="1" fill="#059669" opacity="0.6"/>
  <circle cx="190" cy="45" r="1.5" fill="#fbbf24" opacity="0.6"/>
</svg> 