<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for KGO -->
  <circle cx="20" cy="20" r="15" fill="#dc2626"/>
  
  <!-- KGO text -->
  <text x="20" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">KGO</text>
  
  <!-- Gift box icon -->
  <g transform="translate(40, 10)">
    <!-- Gift box base -->
    <rect x="0" y="6" width="12" height="8" fill="#059669" stroke="#047857" stroke-width="0.5"/>
    
    <!-- Gift box lid -->
    <rect x="1.5" y="3" width="9" height="4" fill="#dc2626" stroke="#b91c1c" stroke-width="0.5"/>
    
    <!-- Ribbon vertical -->
    <rect x="5.5" y="1" width="1.5" height="13" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Ribbon horizontal -->
    <rect x="0" y="7" width="12" height="1.5" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow left -->
    <path d="M 5.5 1 Q 4 0 2.5 1 Q 4 2 5.5 1" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow right -->
    <path d="M 6.5 1 Q 8 0 9.5 1 Q 8 2 6.5 1" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
    
    <!-- Bow center -->
    <circle cx="6" cy="1" r="0.8" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
  </g>
  
  <!-- Brand text -->
  <text x="60" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">Kerala</text>
  <text x="60" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">GiftsOnline</text>
</svg> 