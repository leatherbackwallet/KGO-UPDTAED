<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fef3c7"/>
  <g transform="translate(100, 150)">
    <!-- Cake base -->
    <rect x="0" y="80" width="200" height="40" fill="#fbbf24" rx="5"/>
    <!-- Cake middle -->
    <rect x="10" y="60" width="180" height="30" fill="#f59e0b" rx="5"/>
    <!-- Cake top -->
    <rect x="20" y="40" width="160" height="25" fill="#d97706" rx="5"/>
    <!-- Candles -->
    <rect x="70" y="20" width="4" height="25" fill="#ef4444"/>
    <rect x="90" y="15" width="4" height="30" fill="#10b981"/>
    <rect x="110" y="25" width="4" height="20" fill="#3b82f6"/>
    <rect x="130" y="18" width="4" height="27" fill="#8b5cf6"/>
    <!-- Candle flames -->
    <circle cx="72" cy="18" r="3" fill="#fbbf24"/>
    <circle cx="92" cy="13" r="3" fill="#fbbf24"/>
    <circle cx="112" cy="23" r="3" fill="#fbbf24"/>
    <circle cx="132" cy="16" r="3" fill="#fbbf24"/>
    <!-- Sprinkles -->
    <circle cx="30" cy="90" r="2" fill="#ef4444"/>
    <circle cx="170" cy="85" r="2" fill="#10b981"/>
    <circle cx="50" cy="95" r="2" fill="#3b82f6"/>
    <circle cx="150" cy="90" r="2" fill="#8b5cf6"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Birthday Cake</text>
</svg>
