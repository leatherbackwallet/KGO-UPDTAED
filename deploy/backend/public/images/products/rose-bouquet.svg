<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fef3c7"/>
  <g transform="translate(200, 250)">
    <!-- Flower stems -->
    <line x1="0" y1="0" x2="-30" y2="-80" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="0" x2="-20" y2="-90" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="0" x2="-10" y2="-85" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="0" x2="10" y2="-90" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="0" x2="20" y2="-85" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="0" x2="30" y2="-80" stroke="#22c55e" stroke-width="3"/>
    
    <!-- Roses -->
    <g transform="translate(-30, -80)">
      <circle cx="0" cy="0" r="12" fill="#ef4444"/>
      <circle cx="0" cy="0" r="8" fill="#dc2626"/>
      <circle cx="0" cy="0" r="4" fill="#991b1b"/>
    </g>
    <g transform="translate(-20, -90)">
      <circle cx="0" cy="0" r="10" fill="#ef4444"/>
      <circle cx="0" cy="0" r="6" fill="#dc2626"/>
      <circle cx="0" cy="0" r="3" fill="#991b1b"/>
    </g>
    <g transform="translate(-10, -85)">
      <circle cx="0" cy="0" r="11" fill="#ef4444"/>
      <circle cx="0" cy="0" r="7" fill="#dc2626"/>
      <circle cx="0" cy="0" r="3.5" fill="#991b1b"/>
    </g>
    <g transform="translate(10, -90)">
      <circle cx="0" cy="0" r="10" fill="#ef4444"/>
      <circle cx="0" cy="0" r="6" fill="#dc2626"/>
      <circle cx="0" cy="0" r="3" fill="#991b1b"/>
    </g>
    <g transform="translate(20, -85)">
      <circle cx="0" cy="0" r="11" fill="#ef4444"/>
      <circle cx="0" cy="0" r="7" fill="#dc2626"/>
      <circle cx="0" cy="0" r="3.5" fill="#991b1b"/>
    </g>
    <g transform="translate(30, -80)">
      <circle cx="0" cy="0" r="12" fill="#ef4444"/>
      <circle cx="0" cy="0" r="8" fill="#dc2626"/>
      <circle cx="0" cy="0" r="4" fill="#991b1b"/>
    </g>
    
    <!-- Leaves -->
    <ellipse cx="-15" cy="-40" rx="8" ry="4" fill="#22c55e" transform="rotate(-30 -15 -40)"/>
    <ellipse cx="15" cy="-45" rx="6" ry="3" fill="#22c55e" transform="rotate(30 15 -45)"/>
    <ellipse cx="-25" cy="-60" rx="7" ry="3" fill="#22c55e" transform="rotate(-45 -25 -60)"/>
    <ellipse cx="25" cy="-55" rx="5" ry="2" fill="#22c55e" transform="rotate(45 25 -55)"/>
    
    <!-- Wrapping -->
    <rect x="-40" y="0" width="80" height="20" fill="#fbbf24" rx="5"/>
    <rect x="-35" y="5" width="70" height="10" fill="#f59e0b" rx="3"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Rose Bouquet</text>
</svg>
