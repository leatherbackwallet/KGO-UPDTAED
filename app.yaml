# Automatic scaling configuration for Standard environment
# Standard environment scales to zero (no cost when idle) - major cost savings!
automatic_scaling:
  min_instances: 0  # Scale to zero when idle - saves money!
  max_instances: 3  # Allow scaling for traffic spikes
  target_cpu_utilization: 0.6  # Scale up at 60% CPU
  target_throughput_utilization: 0.8  # Scale up at 80% throughput

# Instance class for Standard environment (much cheaper than Flex)
instance_class: F2  # F2 = 600MHz CPU, 256MB RAM (sufficient for API)

# Health check for Standard environment
readiness_check:
  path: "/api/health-status"
  check_interval_sec: 5
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2
  app_start_timeout_sec: 300  # 5 minutes for cold starts

liveness_check:
  path: "/api/health-status"
  check_interval_sec: 30
  timeout_sec: 4
  failure_threshold: 4
  success_threshold: 2

# Handlers for Standard environment
handlers:
  # Health check endpoint
  - url: /api/health-status
    script: auto
    secure: always
  
  # All API routes
  - url: /api/.*
    script: auto
    secure: always
  
  # Root and other routes
  - url: /.*
    script: auto
    secure: always