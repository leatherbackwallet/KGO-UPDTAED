# Add health check configuration
readiness_check:
  path: "/api/health-status"
  check_interval_sec: 45  # Less aggressive checking
  timeout_sec: 45  # Increased timeout for stability
  failure_threshold: 3  # Reduced threshold for faster detection
  success_threshold: 2  # Require 2 successes for stability
  app_start_timeout_sec: 1200  # 20 minutes for cold starts

liveness_check:
  path: "/api/health-status"
  check_interval_sec: 90  # Much less frequent checks
  timeout_sec: 45  # Increased timeout for stability
  failure_threshold: 3  # Reduced threshold for faster detection
  success_threshold: 2  # Require 2 successes for stability

automatic_scaling:
  min_num_instances: 1  # Minimum required by App Engine Flexible
  max_num_instances: 2  # Reduced for small catalog (~100 items)
  cool_down_period_sec: 300  # 5 minutes - prevents frequent scaling
  cpu_utilization:
    target_utilization: 0.9  # More aggressive threshold for cost optimization

resources:
  cpu: 1  # Reduced from 2 for cost optimization
  memory_gb: 2  # Reduced from 4GB for cost optimization
  disk_size_gb: 5  # Reduced from 10GB for cost optimization

# No handlers needed for flex environment