# App Engine Flex scaling configuration
automatic_scaling:
  min_num_instances: 2
  max_num_instances: 20
  cool_down_period_sec: 120
  cpu_utilization:
    target_utilization: 0.6

# App Engine Flex resources
resources:
  cpu: 2
  memory_gb: 4
  disk_size_gb: 20

# Health checks for App Engine Flex
readiness_check:
  path: "/api/health"
  check_interval_sec: 10
  timeout_sec: 8
  failure_threshold: 3
  success_threshold: 2
  app_start_timeout_sec: 600

liveness_check:
  path: "/api/health"
  check_interval_sec: 60
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 2