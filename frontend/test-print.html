<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Test</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { font-size: 12pt; color: #000; background: #fff; }
            .receipt { border: 1px solid #000; padding: 10pt; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <h1>Print Test Page</h1>
        <button onclick="window.print()">Test Print</button>
    </div>
    
    <div class="receipt">
        <h2>Test Receipt</h2>
        <p>Order ID: TEST-123</p>
        <p>Date: 2024-01-01</p>
        <p>Total: ₹100.00</p>
    </div>
</body>
</html>
