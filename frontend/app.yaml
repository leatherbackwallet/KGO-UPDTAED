# App Engine Standard only (no resources/entrypoint) - cost-optimized
# Deploy from frontend/ so this file is used: cd frontend && gcloud app deploy app.yaml
runtime: nodejs20
service: default

env_variables:
  NODE_ENV: production
  PORT: 8080
  NEXT_PUBLIC_API_URL: "https://api-dot-onyourbehlf.uc.r.appspot.com/api"
  NEXT_PUBLIC_APP_NAME: "OnYourBehlf"
  NEXT_PUBLIC_APP_VERSION: "3.0.0"
  NEXT_PUBLIC_ENABLE_ANALYTICS: "true"
  NEXT_PUBLIC_ENABLE_DEBUG_MODE: "false"
  NEXT_PUBLIC_WHATSAPP_NUMBER: "+918075030919"
  FAST_REFRESH: "false"
  API_URL: "https://api-dot-onyourbehlf.uc.r.appspot.com"
  FRONTEND_URL: "https://www.keralagiftsonline.in"

automatic_scaling:
  min_instances: 0
  max_instances: 3
  target_cpu_utilization: 0.8
  target_throughput_utilization: 0.6

instance_class: F1

handlers:
  - url: /health
    script: auto
    secure: always
  - url: /.*
    script: auto
    secure: always
