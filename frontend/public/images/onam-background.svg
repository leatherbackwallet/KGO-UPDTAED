<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#005933;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#004d2e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#003d25;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="boatGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="50%" style="stop-color:#A0522D"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    
    <radialGradient id="lilyPad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
    </radialGradient>
    
    <radialGradient id="flower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </radialGradient>

    <radialGradient id="whiteFlower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </radialGradient>

    <radialGradient id="yellowFlower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </radialGradient>

    <radialGradient id="orangeFlower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF6347"/>
    </radialGradient>

    <!-- Animations -->
    <animateTransform id="boat1Animation" attributeName="transform" type="translate" 
                      values="-300,300; 1500,300" dur="15s" repeatCount="indefinite"/>
    <animateTransform id="boat2Animation" attributeName="transform" type="translate" 
                      values="-300,280; 1500,280" dur="18s" repeatCount="indefinite" begin="3s"/>
    <animateTransform id="boat3Animation" attributeName="transform" type="translate" 
                      values="-300,320; 1500,320" dur="20s" repeatCount="indefinite" begin="6s"/>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#waterGradient)"/>
  
  <!-- Lily Pads -->
  <circle cx="150" cy="200" r="25" fill="url(#lilyPad)" opacity="0.7"/>
  <circle cx="350" cy="150" r="20" fill="url(#lilyPad)" opacity="0.6"/>
  <circle cx="500" cy="250" r="30" fill="url(#lilyPad)" opacity="0.8"/>
  <circle cx="700" cy="180" r="22" fill="url(#lilyPad)" opacity="0.7"/>
  <circle cx="900" cy="220" r="28" fill="url(#lilyPad)" opacity="0.6"/>
  <circle cx="1050" cy="300" r="24" fill="url(#lilyPad)" opacity="0.8"/>
  <circle cx="200" cy="400" r="26" fill="url(#lilyPad)" opacity="0.7"/>
  <circle cx="400" cy="450" r="21" fill="url(#lilyPad)" opacity="0.6"/>
  <circle cx="600" cy="380" r="29" fill="url(#lilyPad)" opacity="0.8"/>
  <circle cx="800" cy="420" r="23" fill="url(#lilyPad)" opacity="0.7"/>
  <circle cx="1000" cy="480" r="27" fill="url(#lilyPad)" opacity="0.6"/>
  
  <!-- Enhanced Flowers on Lily Pads -->
  <!-- Pink Flowers -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="12" fill="url(#flower)" opacity="0.9"/>
    <circle cx="-8" cy="-8" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="8" cy="-8" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-8" cy="8" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="8" cy="8" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(500, 250)">
    <circle cx="0" cy="0" r="15" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-10" cy="-10" r="7" fill="url(#flower)" opacity="0.7"/>
    <circle cx="10" cy="-10" r="7" fill="url(#flower)" opacity="0.7"/>
    <circle cx="-10" cy="10" r="7" fill="url(#flower)" opacity="0.7"/>
    <circle cx="10" cy="10" r="7" fill="url(#flower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#FFD700"/>
  </g>
  
  <g transform="translate(900, 220)">
    <circle cx="0" cy="0" r="13" fill="url(#flower)" opacity="0.9"/>
    <circle cx="-9" cy="-9" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="9" cy="-9" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-9" cy="9" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="9" cy="9" r="6" fill="url(#flower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(200, 400)">
    <circle cx="0" cy="0" r="11" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-7" cy="-7" r="5" fill="url(#flower)" opacity="0.7"/>
    <circle cx="7" cy="-7" r="5" fill="url(#flower)" opacity="0.7"/>
    <circle cx="-7" cy="7" r="5" fill="url(#flower)" opacity="0.7"/>
    <circle cx="7" cy="7" r="5" fill="url(#flower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <g transform="translate(600, 380)">
    <circle cx="0" cy="0" r="14" fill="url(#flower)" opacity="0.9"/>
    <circle cx="-9" cy="-9" r="7" fill="url(#flower)" opacity="0.8"/>
    <circle cx="9" cy="-9" r="7" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-9" cy="9" r="7" fill="url(#flower)" opacity="0.8"/>
    <circle cx="9" cy="9" r="7" fill="url(#flower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#FFD700"/>
  </g>
  
  <g transform="translate(1000, 480)">
    <circle cx="0" cy="0" r="12" fill="url(#flower)" opacity="0.8"/>
    <circle cx="-8" cy="-8" r="6" fill="url(#flower)" opacity="0.7"/>
    <circle cx="8" cy="-8" r="6" fill="url(#flower)" opacity="0.7"/>
    <circle cx="-8" cy="8" r="6" fill="url(#flower)" opacity="0.7"/>
    <circle cx="8" cy="8" r="6" fill="url(#flower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  
  <!-- White Flowers -->
  <g transform="translate(350, 150)">
    <circle cx="0" cy="0" r="10" fill="url(#whiteFlower)" opacity="0.9"/>
    <circle cx="-6" cy="-6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="6" cy="-6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="-6" cy="6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="6" cy="6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <g transform="translate(700, 180)">
    <circle cx="0" cy="0" r="11" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="-7" cy="-7" r="5" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="7" cy="-7" r="5" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="-7" cy="7" r="5" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="7" cy="7" r="5" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <g transform="translate(1050, 300)">
    <circle cx="0" cy="0" r="12" fill="url(#whiteFlower)" opacity="0.9"/>
    <circle cx="-8" cy="-8" r="5" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="8" cy="-8" r="5" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="-8" cy="8" r="5" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="8" cy="8" r="5" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(400, 450)">
    <circle cx="0" cy="0" r="9" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="-5" cy="-5" r="3" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="5" cy="-5" r="3" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="-5" cy="5" r="3" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="5" cy="5" r="3" fill="url(#whiteFlower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="2" fill="#FFD700"/>
  </g>
  
  <g transform="translate(800, 420)">
    <circle cx="0" cy="0" r="10" fill="url(#whiteFlower)" opacity="0.9"/>
    <circle cx="-6" cy="-6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="6" cy="-6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="-6" cy="6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="6" cy="6" r="4" fill="url(#whiteFlower)" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Additional Floating Flowers -->
  <g transform="translate(250, 100)">
    <circle cx="0" cy="0" r="8" fill="url(#yellowFlower)" opacity="0.8"/>
    <circle cx="-5" cy="-5" r="3" fill="url(#yellowFlower)" opacity="0.7"/>
    <circle cx="5" cy="-5" r="3" fill="url(#yellowFlower)" opacity="0.7"/>
    <circle cx="-5" cy="5" r="3" fill="url(#yellowFlower)" opacity="0.7"/>
    <circle cx="5" cy="5" r="3" fill="url(#yellowFlower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="2" fill="#FF6347"/>
  </g>
  
  <g transform="translate(950, 150)">
    <circle cx="0" cy="0" r="9" fill="url(#orangeFlower)" opacity="0.8"/>
    <circle cx="-6" cy="-6" r="4" fill="url(#orangeFlower)" opacity="0.7"/>
    <circle cx="6" cy="-6" r="4" fill="url(#orangeFlower)" opacity="0.7"/>
    <circle cx="-6" cy="6" r="4" fill="url(#orangeFlower)" opacity="0.7"/>
    <circle cx="6" cy="6" r="4" fill="url(#orangeFlower)" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Prominent "Happy Onam" Text -->
  <text x="50%" y="15%" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="72" font-weight="bold" opacity="0.95">
    <tspan x="50%" dy="0">Happy Onam</tspan>
  </text>
  
  <!-- Animated Snake Boat 1 (Left) -->
  <g transform="translate(100, 300)">
    <animateTransform attributeName="transform" type="translate" 
                      values="-300,300; 1500,300" dur="15s" repeatCount="indefinite"/>
    <!-- Boat Body -->
    <path d="M0,0 L200,0 L220,20 L200,40 L0,40 L-20,20 Z" fill="url(#boatGradient)" stroke="#654321" stroke-width="2"/>
    <!-- Boat Tip -->
    <path d="M-20,20 L-40,15 L-35,25 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <!-- Rowers -->
    <rect x="10" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="30" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="50" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="70" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="90" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="110" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <!-- Oars -->
    <line x1="15" y1="10" x2="5" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="15" y1="30" x2="5" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="35" y1="10" x2="25" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="35" y1="30" x2="25" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="55" y1="10" x2="45" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="55" y1="30" x2="45" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="75" y1="10" x2="65" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="75" y1="30" x2="65" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="95" y1="10" x2="85" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="95" y1="30" x2="85" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="115" y1="10" x2="105" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="115" y1="30" x2="105" y2="25" stroke="#8B4513" stroke-width="3"/>
  </g>
  
  <!-- Animated Snake Boat 2 (Center) -->
  <g transform="translate(400, 280)">
    <animateTransform attributeName="transform" type="translate" 
                      values="-300,280; 1500,280" dur="18s" repeatCount="indefinite" begin="3s"/>
    <!-- Boat Body -->
    <path d="M0,0 L250,0 L270,20 L250,40 L0,40 L-20,20 Z" fill="url(#boatGradient)" stroke="#654321" stroke-width="2"/>
    <!-- Boat Tip -->
    <path d="M-20,20 L-45,15 L-40,25 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <!-- Rowers -->
    <rect x="15" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="35" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="55" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="75" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="95" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="115" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="135" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="155" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <!-- Oars -->
    <line x1="20" y1="10" x2="10" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="20" y1="30" x2="10" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="40" y1="10" x2="30" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="40" y1="30" x2="30" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="60" y1="10" x2="50" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="60" y1="30" x2="50" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="80" y1="10" x2="70" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="80" y1="30" x2="70" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="100" y1="10" x2="90" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="100" y1="30" x2="90" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="120" y1="10" x2="110" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="120" y1="30" x2="110" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="140" y1="10" x2="130" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="140" y1="30" x2="130" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="160" y1="10" x2="150" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="160" y1="30" x2="150" y2="25" stroke="#8B4513" stroke-width="3"/>
  </g>
  
  <!-- Animated Snake Boat 3 (Right) -->
  <g transform="translate(700, 320)">
    <animateTransform attributeName="transform" type="translate" 
                      values="-300,320; 1500,320" dur="20s" repeatCount="indefinite" begin="6s"/>
    <!-- Boat Body -->
    <path d="M0,0 L200,0 L220,20 L200,40 L0,40 L-20,20 Z" fill="url(#boatGradient)" stroke="#654321" stroke-width="2"/>
    <!-- Boat Tip -->
    <path d="M-20,20 L-40,15 L-35,25 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <!-- Rowers -->
    <rect x="10" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="30" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="50" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="70" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="90" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <rect x="110" y="5" width="4" height="30" fill="#FFFFFF" opacity="0.9"/>
    <!-- Oars -->
    <line x1="15" y1="10" x2="5" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="15" y1="30" x2="5" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="35" y1="10" x2="25" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="35" y1="30" x2="25" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="55" y1="10" x2="45" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="55" y1="30" x2="45" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="75" y1="10" x2="65" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="75" y1="30" x2="65" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="95" y1="10" x2="85" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="95" y1="30" x2="85" y2="25" stroke="#8B4513" stroke-width="3"/>
    <line x1="115" y1="10" x2="105" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="115" y1="30" x2="105" y2="25" stroke="#8B4513" stroke-width="3"/>
  </g>
  
  <!-- Palm Frond at Top -->
  <g transform="translate(600, 50)">
    <path d="M0,0 Q-50,-20 -100,0 Q-150,20 -200,40 Q-180,60 -150,80 Q-120,100 -80,120 Q-40,140 0,160 Q40,140 80,120 Q120,100 150,80 Q180,60 200,40 Q150,20 100,0 Q50,-20 0,0 Z" fill="#228B22" opacity="0.8"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="100" r="3" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="150" r="4" fill="white" opacity="0.5"/>
  <circle cx="100" cy="600" r="3" fill="white" opacity="0.6"/>
  <circle cx="1100" cy="650" r="4" fill="white" opacity="0.5"/>
  <circle cx="300" cy="700" r="3" fill="white" opacity="0.6"/>
  <circle cx="900" cy="750" r="4" fill="white" opacity="0.5"/>
  
  <!-- Water Ripples -->
  <ellipse cx="200" cy="500" rx="30" ry="5" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <ellipse cx="800" cy="550" rx="25" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <ellipse cx="500" cy="600" rx="35" ry="6" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
